<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="104" fill="#18181B"/>
  <defs>
    <filter id="pulse_blur_1" x="0" y="0" width="100%" height="100%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="20" result="blur1"/>
    </filter>
    <filter id="pulse_blur_2" x="0" y="0" width="100%" height="100%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="8" result="blur2"/>
    </filter>
  </defs>
  <!-- Pulse Echo 1 -->
  <ellipse cx="256" cy="256" rx="80" ry="120" fill="#3B82F6" fill-opacity="0.15" filter="url(#pulse_blur_1)"/>
  <!-- Pulse Echo 2 -->
  <ellipse cx="256" cy="256" rx="40" ry="120" fill="#3B82F6" fill-opacity="0.3" filter="url(#pulse_blur_2)"/>
  <!-- Core Cursor -->
  <rect x="251" y="136" width="10" height="240" rx="5" fill="#3B82F6" style="filter: drop-shadow(0px 0px 15px rgba(59, 130, 246, 0.8))"/>
</svg>
