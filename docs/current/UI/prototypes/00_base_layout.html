<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writer V5 Prototype - Layout & Base</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- 仅为原型引入的基础样式 -->
    <style>
        body {
            @apply antialiased text-zinc-800 bg-white;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        .glass-header {
            @apply bg-white/80 backdrop-blur-md border-b border-zinc-200;
        }

        .sidebar {
            @apply bg-zinc-50 border-r border-zinc-200;
        }

        .btn-icon {
            @apply p-1.5 rounded-md text-zinc-500 hover:text-zinc-800 hover:bg-zinc-200/50 transition-colors;
        }
    </style>
</head>

<body class="flex flex-col h-screen">

    <!-- 顶栏 (Header) -->
    <header class="h-10 glass-header flex items-center justify-between px-4 select-none" style="padding-left: 80px;">
        <!-- 左侧留出 Mac 交通灯位置 -->
        <div class="flex items-center space-x-4">
            <span class="font-semibold text-sm">Writer</span>
        </div>
        <div class="text-xs text-zinc-500 flex items-center space-x-2">
            <span>Active: /Users/zhengpanpan/Downloads/untitled folder/1111.md</span>
        </div>
        <div class="w-20"></div> <!-- 占位平衡 -->
    </header>

    <!-- 主体区域 (Main Content) -->
    <div class="flex flex-1 overflow-hidden">

        <!-- 左侧边栏 (Explorer) -->
        <aside class="w-64 sidebar flex flex-col shrink-0">
            <!-- 侧边栏头部 -->
            <div class="h-10 flex items-center justify-between px-3 border-b border-transparent">
                <span class="text-xs font-semibold text-zinc-500 tracking-wider">EXPLORER</span>
                <div class="flex space-x-1">
                    <!-- 放大了图标和热区 -->
                    <button
                        class="p-2 rounded-md text-zinc-500 hover:text-zinc-800 hover:bg-zinc-200/50 transition-colors"
                        title="New File">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <path d="M14 2v6h6"></path>
                            <line x1="12" y1="18" x2="12" y2="12"></line>
                            <line x1="9" y1="15" x2="15" y2="15"></line>
                        </svg>
                    </button>
                    <button
                        class="p-2 rounded-md text-zinc-500 hover:text-zinc-800 hover:bg-zinc-200/50 transition-colors"
                        title="New Folder">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z">
                            </path>
                            <line x1="12" y1="11" x2="12" y2="17"></line>
                            <line x1="9" y1="14" x2="15" y2="14"></line>
                        </svg>
                    </button>
                    <button
                        class="p-2 rounded-md text-zinc-500 hover:text-zinc-800 hover:bg-zinc-200/50 transition-colors"
                        title="Collapse All">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="9" y1="3" x2="9" y2="21"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 搜索框 -->
            <div class="px-3 py-2 border-b border-zinc-200">
                <div class="relative">
                    <svg class="absolute left-2 top-2 text-zinc-400" width="14" height="14" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" placeholder="Search files..."
                        class="w-full bg-white border border-zinc-200 rounded-md py-1.5 pl-8 pr-3 text-xs focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder-zinc-400">
                </div>
            </div>

            <!-- 文件列表 -->
            <div class="flex-1 overflow-y-auto px-2 py-2">
                <!-- 激活的文件项 -->
                <div
                    class="flex items-center px-2 py-1.5 rounded-md bg-blue-50 text-blue-700 cursor-default select-none group">
                    <svg class="mr-2 opacity-70" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <path d="M14 2v6h6"></path>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span class="text-sm truncate">1111.md</span>
                </div>
            </div>
        </aside>

        <!-- 编辑器区域 (Editor) -->
        <main class="flex-1 flex flex-col bg-white overflow-hidden">
            <!-- 极简工具栏替代方案 -->
            <div class="h-12 border-b border-zinc-100 flex items-center justify-between px-6 shrink-0 select-none">
                <div class="text-xs text-zinc-400">
                    💡 使用选中文本或右键以呼出格式化菜单 (Bubble Menu)
                </div>
            </div>

            <!-- 文本输入区 -->
            <div class="flex-1 overflow-y-auto px-16 py-12 relative">
                <div class="max-w-3xl mx-auto relative">
                    <h1 class="text-4xl font-bold text-zinc-900 mb-6">11111</h1>
                    <p class="text-base text-zinc-800 mb-4 leading-relaxed">
                        测<span class="bg-blue-100 text-blue-900">试文</span>本
                    </p>

                    <!-- 预设的 Bubble Menu 效果 (悬浮在选区上方) -->
                    <div class="bubble-menu" style="left: 0px; top: 30px;">
                        <button class="bubble-btn font-bold w-8 text-sm" title="加粗 (⌘B)">B</button>
                        <button class="bubble-btn italic w-8 text-sm" title="斜体 (⌘I)">I</button>
                        <button class="bubble-btn line-through w-8 text-sm" title="删除线 (⇧⌘X)">S</button>
                        <div class="bubble-divider"></div>
                        <button class="bubble-btn w-8 text-sm italic font-serif" title="引用">“</button>
                        <button class="bubble-btn w-8 text-sm font-mono bg-zinc-700 text-white"
                            title="代码块">&lt;/&gt;</button>
                        <button class="bubble-btn w-8 text-xs text-blue-400" title="超链接">Link</button>
                    </div>

                    <!-- 模拟光标 -->
                    <div class="h-5 w-[1.5px] bg-blue-500 animate-pulse mt-2 ml-16"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 底部状态栏 (Bottom Status Bar) -->
    <footer
        class="h-8 glass-header flex items-center justify-between px-4 select-none shrink-0 border-t border-zinc-200">
        <!-- V5 要求的保存状态指示器 -->
        <div class="flex items-center space-x-2 cursor-pointer group">
            <div
                class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_4px_rgba(16,185,129,0.5)] transition-opacity duration-1000">
            </div>
            <span class="text-xs text-zinc-500 group-hover:text-zinc-800 transition-colors">Saved</span>
        </div>

        <div class="flex space-x-4">
            <span class="text-xs text-zinc-400">Word Count: 4</span>
            <span class="text-xs text-zinc-400">Markdown</span>
        </div>
    </footer>

</body>

</html>
