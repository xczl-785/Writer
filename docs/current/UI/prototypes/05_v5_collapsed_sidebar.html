<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writer V5 Prototype - Collapsed Sidebar (Focus Mode)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body class="flex flex-col h-screen antialiased text-zinc-800 bg-white">

    <!-- 主体内容区 (全屏模式) -->
    <div class="flex flex-1 overflow-hidden relative">

        <!-- 侧边栏 (宽度为0，模拟收起) -->
        <aside
            class="w-0 bg-zinc-50 border-r border-zinc-200 flex flex-col shrink-0 transition-all duration-300 overflow-hidden">
        </aside>

        <!-- 编辑器主区域 -->
        <main class="flex-1 flex flex-col bg-white overflow-hidden relative">

            <!-- 收起后的顶栏：面包屑左侧增加切换按钮 -->
            <header class="h-12 flex items-center px-6 justify-between shrink-0 select-none transition-colors z-10">
                <div class="flex items-center text-sm">
                    <!-- 侧边栏展开按钮 (仅在收起时显示，且位置在最左侧) -->
                    <button
                        class="mr-4 p-1.5 rounded-md text-zinc-300 hover:text-zinc-800 hover:bg-zinc-100 transition-all"
                        title="Show Sidebar (Cmd+\)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="9" y1="3" x2="9" y2="21"></line>
                        </svg>
                    </button>

                    <!-- 面包屑 -->
                    <div class="flex items-center text-zinc-400">
                        <span class="hover:text-zinc-600 cursor-pointer">projects</span>
                        <span class="mx-2 text-zinc-300">/</span>
                        <span class="font-medium text-zinc-800">11111</span>
                    </div>
                </div>

                <!-- 右侧大纲按钮 -->
                <div class="flex items-center">
                    <button
                        class="p-1.5 rounded-md text-zinc-400 hover:text-zinc-800 hover:bg-zinc-100 transition-colors">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="8" y1="6" x2="21" y2="6"></line>
                            <line x1="8" y1="12" x2="21" y2="12"></line>
                            <line x1="8" y1="18" x2="21" y2="18"></line>
                            <line x1="3" y1="6" x2="3.01" y2="6"></line>
                            <line x1="3" y1="12" x2="3.01" y2="12"></line>
                            <line x1="3" y1="18" x2="3.01" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- 全屏居中的编辑区 -->
            <div class="flex-1 overflow-y-auto px-[15%] py-12 relative cursor-text">
                <div class="max-w-3xl mx-auto relative editor-content">
                    <h1 class="text-4xl font-bold text-zinc-900 mb-8 mt-12">专注模式：极致沉浸</h1>
                    <p class="text-lg text-zinc-800 mb-6 leading-relaxed">
                        当侧边栏收起时，编辑区的 Padding 应该适当增加（从 10% 增加到 15%），确保文字始终处于视觉的中央区域。
                    </p>
                    <p class="text-lg text-zinc-600 mb-6 leading-relaxed">
                        所有的边框感都消失了。此时用户面对的只有白色的纸张和跳动的蓝色光标。
                    </p>

                    <div class="flex items-center mt-12">
                        <span class="h-6 w-[2.5px] bg-blue-500 animate-pulse mr-1"></span>
                        <span class="text-zinc-300 italic opacity-50">/ 沉浸写作随心而至...</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 底栏同样保持简洁 -->
    <footer
        class="h-7 border-t border-zinc-100 bg-white flex items-center justify-between px-3 shrink-0 text-xs text-zinc-400 select-none">
        <div class="flex items-center space-x-2">
            <div class="w-1.5 h-1.5 rounded-full bg-green-500 opacity-20"></div>
            <span>Focused</span>
        </div>
        <div class="flex items-center space-x-4">
            <span>242 words</span>
            <span class="text-green-500/40 font-bold tracking-widest text-[10px]">SYNC</span>
        </div>
    </footer>

</body>

</html>
