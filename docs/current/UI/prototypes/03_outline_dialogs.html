<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writer V5 Prototype - Outline & Dialogs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body {
            @apply antialiased text-zinc-800 bg-zinc-100 min-h-screen flex items-center justify-center p-8;
        }

        /* Outline Item 缩进样式 */
        .outline-item {
            @apply px-3 py-1 text-sm text-zinc-600 hover:text-blue-600 hover:bg-blue-50 cursor-pointer border-l-2 border-transparent hover:border-blue-400 transition-colors truncate;
        }

        .outline-item.active {
            @apply text-blue-600 bg-blue-50/50 border-blue-500 font-medium;
        }

        .h1-level {
            @apply pl-3;
        }

        .h2-level {
            @apply pl-6 text-[13px];
        }

        .h3-level {
            @apply pl-9 text-xs text-zinc-500;
        }

        /* 原生风格 Dialog */
        .system-dialog {
            @apply bg-white border border-zinc-200 rounded-lg shadow-2xl w-[400px] overflow-hidden;
        }
    </style>
</head>

<body class="flex items-start justify-center space-x-12">

    <!-- [演示 A]: 抽屉大纲 (Outline) -->
    <div class="bg-white border border-zinc-200 shadow-sm rounded-lg h-[600px] w-[300px] flex flex-col overflow-hidden">
        <div class="h-10 border-b border-zinc-100 flex items-center justify-between px-3 bg-zinc-50/50">
            <span class="text-xs font-semibold text-zinc-500 tracking-wider">OUTLINE</span>
            <button class="text-zinc-400 hover:text-zinc-700" title="Close Panel">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <!-- 大纲列表 -->
        <div class="flex-1 overflow-y-auto py-2">
            <!-- 采用 Gutter Line 的高亮交互 -->
            <div class="outline-item h1-level">第一部分：顶层设计</div>
            <div class="outline-item h2-level">1.1 软件风格定义</div>
            <div class="outline-item h3-level">产品人格</div>
            <div class="outline-item h3-level">设计哲学</div>
            <div class="outline-item h2-level">1.2 用户故事体系</div>
            <div class="outline-item h3-level">角色定义</div>
            <div class="outline-item h3-level">场景 A: 文件管理</div>
            <!-- 当前视口阅读位置高亮 -->
            <div class="outline-item h2-level active">1.3 交互原则 (Reading)</div>
            <div class="outline-item h3-level">第一原则：无打断</div>
            <div class="outline-item h3-level">第二原则：一致性</div>
            <div class="outline-item h1-level">第二部分：V5 范围定义</div>
            <div class="outline-item h2-level">2.1 纳入 V5 的功能</div>
            <div class="outline-item h1-level">第三部分：验收框架</div>
            <div class="outline-item h2-level">3.1 质量属性验收</div>
        </div>
    </div>

    <!-- [演示 B]: 破坏性操作的二次确认 (Dialog) -->
    <div class="flex flex-col space-y-8 mt-12">
        <h3 class="text-sm font-medium text-zinc-500 mb-2">文件删除确认 (跨平台统一 Neutral Modern 风格)</h3>

        <div class="system-dialog relative select-none">
            <!-- Mac / Win 表现中性 -->
            <div class="p-5 flex items-start space-x-4">
                <!-- 警示 Icon -->
                <div
                    class="shrink-0 flex items-center justify-center w-10 h-10 rounded-full bg-red-100 text-red-500 mt-1">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18"></path>
                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </div>

                <div class="flex-1 pt-1">
                    <h4 class="text-base font-semibold text-zinc-900 mb-1">移至废纸篓？</h4>
                    <p class="text-sm text-zinc-500 leading-relaxed mb-1">
                        确定要将 <span class="font-medium text-zinc-700">"docs_architecture.md"</span> 移至废纸篓吗？
                    </p>
                    <p class="text-xs text-zinc-400">此文件可通过系统废纸篓恢复。</p>
                </div>
            </div>

            <!-- 操作区 (安全取消必定在左或首位聚焦层) -->
            <div class="px-5 py-4 bg-zinc-50 border-t border-zinc-100 flex justify-end space-x-3">
                <button
                    class="px-4 py-1.5 text-sm font-medium rounded-md border border-zinc-200 bg-white text-zinc-700 hover:bg-zinc-100 transition-colors focus:outline-none focus:ring-2 focus:ring-zinc-400 focus:ring-offset-2 ring-offset-zinc-50 autofocus">
                    取消
                </button>
                <button
                    class="px-4 py-1.5 text-sm font-medium rounded-md border border-red-500 bg-red-500 text-white hover:bg-red-600 transition-colors focus:outline-none focus:ring-2 focus:ring-red-400 focus:ring-offset-2 ring-offset-zinc-50">
                    移至废纸篓
                </button>
            </div>
        </div>

    </div>

</body>

</html>
