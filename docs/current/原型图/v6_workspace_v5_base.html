<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writer V6 Prototype - Based on V5 Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.2s ease-out',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* V5 选中效果对齐 */
        .item-active-file {
            background-color: rgba(239, 246, 255, 0.5);
            /* blue-50/50 */
            color: #18181b !important;
        }

        .item-active-file::before {
            content: '';
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 4px;
            width: 3px;
            background-color: #3b82f6;
            /* blue-500 */
            border-radius: 0 4px 4px 0;
        }
    </style>
</head>

<body class="flex flex-col h-screen antialiased text-zinc-800 bg-white">

    <!-- 主体内容区 (左右分栏) -->
    <div class="flex flex-1 overflow-hidden">
        <!-- 侧边栏 (Sidebar) - 文件树 -->
        <aside class="w-64 bg-zinc-50 border-r border-zinc-200 flex flex-col shrink-0">
            <!-- Explorer Header -->
            <div class="h-10 flex items-center justify-between px-3 border-b border-transparent">
                <span id="sidebar-header-title" class="text-[11px] font-bold text-zinc-400 tracking-widest">FILES</span>
                <div class="flex space-x-1">
                    <button
                        class="p-2 rounded-md text-zinc-500 hover:text-zinc-800 hover:bg-zinc-200/50 transition-colors"
                        title="New File">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <path d="M14 2v6h6"></path>
                            <line x1="12" y1="18" x2="12" y2="12"></line>
                            <line x1="9" y1="15" x2="15" y2="15"></line>
                        </svg>
                    </button>
                    <button onclick="addRootFolder()"
                        class="p-2 rounded-md text-zinc-500 hover:text-zinc-800 hover:bg-zinc-200/50 transition-colors"
                        title="Open Folder">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z">
                            </path>
                            <line x1="12" y1="11" x2="12" y2="17"></line>
                            <line x1="9" y1="14" x2="15" y2="14"></line>
                        </svg>
                    </button>
                    <button
                        class="p-2 rounded-md text-zinc-500 hover:text-zinc-800 hover:bg-zinc-200/50 transition-colors"
                        title="Collapse All">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="9" y1="3" x2="9" y2="21"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 搜索框 -->
            <div class="px-3 py-2 border-b border-zinc-200">
                <div class="relative">
                    <svg class="absolute left-2 top-2 text-zinc-400" width="14" height="14" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" placeholder="Search files..."
                        class="w-full bg-white border border-zinc-200 rounded-md py-1.5 pl-8 pr-3 text-xs focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder-zinc-400">
                </div>
            </div>

            <!-- 文件列表 -->
            <div id="file-list" class="flex-1 overflow-y-auto py-2">
                <!-- 动态渲染内容 -->
            </div>
        </aside>

        <!-- 编辑器主区域 -->
        <main class="flex-1 flex flex-col bg-white overflow-hidden relative">

            <!-- V6 核心变更：空状态视图 (默认激活) -->
            <div id="empty-state"
                class="absolute inset-0 flex flex-col items-center justify-center bg-white z-20 animate-fade-in">
                <div class="w-full max-w-sm py-20 flex flex-col items-center">
                    <div class="mb-1"><i data-lucide="sparkles" class="w-10 h-10 text-zinc-900"></i></div>
                    <div class="text-xl font-bold mb-1">Writer</div>
                    <div class="text-sm text-zinc-400 mb-10 italic">写作，心流</div>

                    <div class="flex space-x-4 mb-10">
                        <button onclick="addRootFolder()"
                            class="px-6 py-2 bg-zinc-900 text-white text-sm font-medium rounded-md hover:bg-zinc-800 transition-colors shadow-sm">
                            打开文件夹
                        </button>
                        <button
                            class="px-6 py-2 border border-zinc-200 text-zinc-600 text-sm font-medium rounded-md hover:bg-zinc-50 transition-colors">
                            打开工作区
                        </button>
                    </div>

                    <div class="w-full px-8">
                        <div
                            class="flex items-center text-zinc-300 text-[10px] font-bold uppercase tracking-[0.2em] mb-4">
                            <div class="flex-grow border-t border-zinc-200 mr-3"></div>
                            最近打开
                            <div class="flex-grow border-t border-zinc-200 ml-3"></div>
                        </div>
                        <div class="space-y-1">
                            <div
                                class="flex items-center text-sm p-2 rounded hover:bg-zinc-100/50 text-zinc-700 cursor-pointer transition-colors">
                                <i data-lucide="briefcase" class="w-4 h-4 mr-2.5 text-zinc-400"></i>
                                <span>项目文档 (工作区)</span>
                            </div>
                            <div
                                class="flex items-center text-sm p-2 rounded hover:bg-zinc-100/50 text-zinc-700 cursor-pointer transition-colors">
                                <i data-lucide="folder" class="w-4 h-4 mr-2.5 text-zinc-400"></i>
                                <span class="truncate">~/Documents/notes</span>
                            </div>
                        </div>
                        <div class="mt-8 text-center text-xs text-zinc-300 italic">或拖拽文件夹到此处</div>
                    </div>
                </div>
            </div>

            <!-- 编辑器内容区 (有内容时显示) -->
            <div id="editor-view" class="hidden flex flex-col flex-1 overflow-hidden">
                <!-- 新版顶栏 -->
                <header
                    class="h-12 flex items-center px-6 justify-between shrink-0 select-none group hover:bg-white transition-colors z-10">
                    <div class="flex items-center text-sm text-zinc-400">
                        <span class="hover:text-zinc-600 cursor-pointer">untitled folder</span>
                        <span class="mx-2 text-zinc-300">/</span>
                        <span class="font-medium text-zinc-800">11111</span>
                    </div>

                    <div class="flex items-center">
                        <button
                            class="p-1.5 rounded-md text-zinc-400 hover:text-zinc-800 hover:bg-zinc-100 transition-colors">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="8" y1="6" x2="21" y2="6"></line>
                                <line x1="8" y1="12" x2="21" y2="12"></line>
                                <line x1="8" y1="18" x2="21" y2="18"></line>
                                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                                <line x1="3" y1="18" x2="3.01" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                </header>

                <!-- 纯净文本输入区 -->
                <div class="flex-1 overflow-y-auto px-[10%] py-12 relative cursor-text">
                    <div class="max-w-3xl mx-auto relative editor-content">
                        <h1 class="text-4xl font-bold text-zinc-900 mb-6 tracking-tight">V6 工作区原型</h1>
                        <p class="text-lg text-zinc-800 mb-4 leading-relaxed">这一版原型是直接基于 V5
                            的源码进行“增量开发”的。所有的视觉比例、图标样式和颜色系统都与 V5 完美对齐。</p>
                        <p class="text-base text-zinc-600 leading-relaxed mb-4">核心变更点：</p>
                        <ul class="list-disc ml-6 space-y-2 text-zinc-600 text-sm">
                            <li>引入了“空状态”中心视图。</li>
                            <li>侧边栏支持“多根文件夹”展示。</li>
                            <li>状态栏精简了 Git 状态，强化了工作区反馈。</li>
                        </ul>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 状态栏 (对齐 V5 比例，修正 V6 内容) -->
    <footer
        class="h-7 border-t border-zinc-200 bg-white flex items-center justify-between px-3 shrink-0 text-[11px] select-none z-50 relative">
        <div class="flex items-center space-x-3">
            <!-- V6 规范：指示灯与保存状态 -->
            <div id="status-indicator"
                class="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_4px_rgba(34,197,94,0.4)] transition-opacity">
            </div>
            <span id="status-text" class="text-zinc-500">已保存</span>

            <!-- V6 规范：工作区标识 -->
            <div id="workspace-indicator" class="hidden border-l border-zinc-100 pl-3 flex items-center">
                <span id="workspace-name" class="text-zinc-400 font-medium">我的写作项目</span>
            </div>
        </div>

        <div class="flex items-center space-x-4 text-zinc-400">
            <span>150 words</span>
            <span>UTF-8</span>
            <!-- 移除 SYNC，保留占位 -->
            <span class="w-2"></span>
        </div>
    </footer>

    <script>
        let folders = [];

        function addRootFolder() {
            if (folders.length >= 3) return;
            const names = ["项目文档", "资源素材", "灵感库"];
            folders.push(names[folders.length]);

            updateUI();
        }

        function removeFolder(idx) {
            folders.splice(idx, 1);
            updateUI();
        }

        function updateUI() {
            const emptyState = document.getElementById('empty-state');
            const editorView = document.getElementById('editor-view');
            const fileList = document.getElementById('file-list');
            const sidebarHeader = document.getElementById('sidebar-header-title');
            const workspaceInd = document.getElementById('workspace-indicator');
            const workspaceName = document.getElementById('workspace-name');
            const statusIndicator = document.getElementById('status-indicator');

            if (folders.length === 0) {
                emptyState.classList.remove('hidden');
                editorView.classList.add('hidden');
                sidebarHeader.innerText = "FILES";
                workspaceInd.classList.add('hidden');
                statusIndicator.style.opacity = "0.3";
                fileList.innerHTML = `<div class="px-3 py-10 text-center text-[11px] text-zinc-300 italic">尚未打开文件夹</div>`;
            } else {
                emptyState.classList.add('hidden');
                editorView.classList.remove('hidden');
                sidebarHeader.innerText = "EXPLORER";
                workspaceInd.classList.remove('hidden');
                statusIndicator.style.opacity = "1";

                if (folders.length === 1) {
                    workspaceName.innerText = folders[0];
                    workspaceName.classList.remove('italic');
                } else {
                    workspaceName.innerHTML = `未命名工作区 <span class="opacity-40">(未保存)</span>`;
                    workspaceName.classList.add('italic');
                }

                // 渲染多根文件夹
                fileList.innerHTML = '';
                folders.forEach((name, i) => {
                    const root = document.createElement('div');
                    root.className = "group mb-2";

                    let subItems = '';
                    // 仅为第一个文件夹展示丰富的多级层级结构
                    if (i === 0) {
                        subItems = `
                        <!-- 活跃文件 (缩进带指示条) -->
                        <div class="flex items-center px-3 py-1.5 ml-6 mt-0.5 cursor-pointer select-none group relative bg-blue-50/50">
                            <div class="absolute left-[-24px] top-1 bottom-1 w-[3px] bg-blue-500 rounded-r-full"></div>
                            <svg class="w-4 h-4 text-blue-500 mr-2 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <path d="M14 2v6h6"></path>
                            </svg>
                            <span class="text-sm font-medium text-zinc-900 truncate">welcome.md</span>
                        </div>
                        
                        <!-- 选中但静置的文件夹 (对应第二张图的 archive) -->
                        <div class="flex items-center px-3 py-1.5 mt-2 cursor-pointer select-none group text-zinc-800 bg-zinc-200/50 hover:bg-zinc-200/80 transition-colors">
                            <svg class="w-4 h-4 mr-2 text-zinc-600 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 18l6-6-6-6"></path>
                            </svg>
                            <svg class="w-4 h-4 mr-2 text-zinc-800 shrink-0" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"></path>
                            </svg>
                            <span class="text-sm font-medium">历史归档</span>
                        </div>
                        
                        <!-- 静置的文件夹 (对应第二张图的 snippets) -->
                        <div class="flex items-center px-3 py-1.5 mt-2 cursor-pointer select-none group text-zinc-500 hover:text-zinc-800 transition-colors">
                            <svg class="w-4 h-4 mr-2 text-zinc-300 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 18l6-6-6-6"></path>
                            </svg>
                            <svg class="w-4 h-4 mr-2 text-zinc-400 group-hover:text-zinc-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                            </svg>
                            <span class="text-sm">组件片段</span>
                        </div>
                        
                        <!-- 普通未选中文件 (对应第二张图的 Design_System) -->
                        <div class="flex items-center px-3 py-1.5 cursor-pointer hover:bg-zinc-100/50 select-none group mt-1">
                            <svg class="w-4 h-4 text-zinc-400 mr-2 ml-6 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            </svg>
                            <span class="text-sm text-zinc-500 group-hover:text-zinc-900 truncate">设计规范.md</span>
                        </div>
                        `;
                    }

                    root.className = i === 0 ? "group mb-2" : "group mb-2 mt-4";
                    root.innerHTML = `
                        <div class="flex items-center justify-between px-3 py-1.5 cursor-pointer hover:bg-zinc-100/80 transition-colors">
                            <div class="flex items-center">
                                ${i === 0
                            ? `<svg class="w-4 h-4 mr-2 text-zinc-400 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"></path></svg>`
                            : `<svg class="w-4 h-4 mr-2 text-zinc-300 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"></path></svg>`}
                                <!-- 纯线框根文件夹图标 -->
                                <svg class="w-4 h-4 mr-2 text-zinc-600 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                                </svg>
                                <span class="text-sm font-bold text-zinc-800 truncate">${name}</span>
                            </div>
                            <!-- V6 [x] 移除按钮 -->
                            <button onclick="event.stopPropagation(); removeFolder(${i})" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-500 text-zinc-300 transition-all shrink-0">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>
                        <div class="h-px bg-zinc-200 mx-3 mb-1 opacity-70"></div>
                        ${subItems}
                    `;
                    fileList.appendChild(root);
                });
            }
            // 重新初始化所有图标
            if (window.lucide) {
                lucide.createIcons();
            }
        }

        // 初始化
        updateUI();
    </script>
</body>

</html>
